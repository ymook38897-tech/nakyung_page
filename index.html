<!DOCTYPE html>
<html>
<head>
    <title>이나경 소개 페이지</title>
    <style>

body {
     background:#f8f9fa;
    ;
}
h1 {
    color:#0077ff;
    text-align:center;
    font-size: 45px;
}
h1 {
    text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
}
div {
    border: 1px solid black;
    padding: 20px;
    margin: 20px;
}
button{
    background:#0077ff;
    color:white;
    font-size:16px;
    border:none;
    border-radius:10px;
    transition:0.3s;
}


button:hover{
    background:#005ad1;
    transform:translateY(-3px);
    cursor:pointer;
}
img:hover{
    transform:scale(1.08);
    border-radius: 10px;
}
.profile:hover{
    background-color:#020202;
}

img{
border-radius:20px;
box-shadow: 0 10px 30px rgba(0,0,0,0.3);
transition:0.3s;
}
#profile:hover{
    transition:0.3s;
    transform:translateY(-10px);
}
#profile{
    display:none;
}
.container{
    display:flex;
    gap:30px;
    justify-content:center;
    align-items:flex-start;
}
#profile{
    background:white;
    border:none;
    border-radius:20px;
    box-shadow: 0 15px 40px rgba(0,0,0,.15);
}
body{
    font-family: 'arial', sans-serif;
}
input{
    padding: 12px;
    width: 250px;
    border-radius: 10px;
    border: 1px solid gray;
}
#result{
    font-size: 25px;
    color:#0077ff;
    font-weight: bold;
}
</style>
</head>
<body>
    <h1>프로미스나인 이나경</h1>
    <div class="container">
    <img src="이나경.webp" alt="이나경" width="300">
        <button id="toggleBtn">
            프로필 불러오기
        </button>

        <div id="profile">
    </div>
    </div>
    <div>
    <h2>나경이 보러가기</h2>
    
    <p><a href="https://namu.wiki/w/%EC%9D%B4%EB%82%98%EA%B2%BD(%ED%94%84%EB%A1%9C%EB%AF%B8%EC%8A%A4%EB%82%98%EC%9D%B8)" target="_blank">
        <button>나경이 보러가기</button></a></p>
   </div>
    <div>
    <button id="helloBtn">인사하기</button>
    </div>
<input type="text" id="nameInput">

<button onclick="showName()">
확인
</button>


<script>
    const member = {
    name: "이나경",
    age: 26,
    birthday: "2000년 6월 1일",
    hometown:"광주광역시",
    job:"가수, 배우",
    group: "프로미스나인",
    debut:"2018년",
    position: "리드보컬",
    nickname: "나꼬, 바보대장, 동그래미꼬"
}
let isOpen = false;

function loadProfile(){
    const profile = document.getElementById("profile");
    profile.style.display = "block";
    profile.innerHTML = `
<h2>${member.name}</h2>
<p>나이: ${member.age}</p>
<p>생년월일: ${member.birthday}</p>
<p>출신: ${member.hometown}</p>
<p>직업: ${member.job}</p>
<p>소속 그룹: ${member.group}</p>
<p>데뷔: ${member.debut}</p>
<p>포지션: ${member.position}</p>
<p>별명: ${member.nickname}</p>
`;
}
function hideProfile(){
    const profile = document.getElementById("profile");
    profile.style.display = "none";
    profile.innerHTML = "";
}
function toggleProfile(){
    if(isOpen){
        hideProfile();
        isOpen = false;
        document.getElementById("toggleBtn").innerText = "프로필 불러오기";
    }else{
        loadProfile();
        document.getElementById("toggleBtn").innerText = "프로필 닫기";
        isOpen = true;
    }
}
document.getElementById("toggleBtn").addEventListener("click", toggleProfile);


function hello() {
    let name = "이나경";
    let age = 26;


    alert(name);
    alert(age);
}   
function showName(){
    let name = document.getElementById("nameInput").value;
    if(name == "윤종현")
    {
        document.getElementById("result").innerHTML = "환영합니다<br/>" + name + "님";
    }
    else{
        document.getElementById("result").innerHTML = "등록되지 않은 이름입니다.";
    }
}
</script>
</body>
</html>
